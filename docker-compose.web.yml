# docker-compose for outposts-web production host
#
# Architecture: bun-injector fetches OIDC config projection from confluence
# via HTTP, injects it into index.html, writes to shared volume.
# nginx serves the injected index.html + static assets.
#
# Prerequisites:
#   - Build outposts-web: pnpm exec nx build outposts-web --configuration=production
#   - Set env vars in .env: PROJECTION_SOURCES (JSON array)

services:
  injector:
    build:
      context: apps/outposts-web-host
      dockerfile: Dockerfile
    volumes:
      - web-shared:/shared
      - ./dist/apps/outposts-web/browser:/app:ro
    env_file: .env
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - web-shared:/shared:ro
      - ./dist/apps/outposts-web/browser:/usr/share/nginx/html:ro
      - ./apps/outposts-web/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${OUTPOSTS_WEB_PORT:-80}:80"
    depends_on:
      - injector
    restart: unless-stopped

volumes:
  web-shared:
