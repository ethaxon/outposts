repos:
  - repo: local
    hooks:
      - id: pnpm-lint
        name: pnpm lint
        entry: pnpm lint
        language: system
        pass_filenames: false
        stages: [commit]
      - id: pnpm-format-check
        name: pnpm format:check
        entry: pnpm format:check
        language: system
        pass_filenames: false
        stages: [commit]
      - id: cargo-clippy
        name: cargo clippy --workspace --all-features
        entry: cargo clippy --workspace --all-features
        language: system
        pass_filenames: false
        stages: [commit]
