# the events block is required
events{}

http {
    # include the default mime.types to map file extensions to MIME types
    include /etc/nginx/mime.types; 

    server {        
        # set the root directory for the server (we need to copy our 
        # application files here)
        root /usr/share/nginx/html;

        # set the default index file for the server (Angular generates the 
        # index.html file for us and it will be in the above directory)
        index index.html;

        # Serve the injected index.html from the shared volume (written
        # by the bun-injector sidecar). Falls back to the original
        # index.html from the build output if the shared version is absent.
        location = /index.html {
            root /shared;
            try_files /index.html /usr/share/nginx/html/index.html;
        }

        # specify the configuration for the '/' location
        location / {
            # try to serve the requested URI. if that fails then try to 
            # serve the URI with a trailing slash. if that fails, then 
            # serve the index.html file from the shared volume (SPA fallback)
            try_files $uri $uri/ @spa_fallback;
        }

        # SPA fallback: serve the injected index.html
        location @spa_fallback {
            root /shared;
            try_files /index.html /usr/share/nginx/html/index.html;
        }
    }
}
