<p-dataView #dv [value]="confluences()">
  <ng-template #emptymessage>
    @if (overlayService.loading$$ | async) {
      <div class="p-4">
        <p-skeleton class="mb-2"></p-skeleton>
        <p-skeleton width="10rem" class="mb-2"></p-skeleton>
        <p-skeleton width="5rem" class="mb-2"></p-skeleton>
        <p-skeleton height="2rem" class="mb-2"></p-skeleton>
      </div>
    } @else {
      <div class="flex justify-center align-center py-10">
        <i class="pi pi-inbox" style="font-size: 2.5rem"></i>
      </div>
    }
  </ng-template>
  <ng-template #header>
    <div class="flex justify-between items-center">
      <div class="text-2xl flex items-center">
        {{ "confluence.dashboard.title" | transloco }}
      </div>
      <p-button
        [label]="'common.actions.add' | transloco"
        (click)="addConfluence()"
        icon="pi pi-plus"
        [outlined]="true"
      />
    </div>
  </ng-template>
  <ng-template #list let-items>
    @for (item of items; track $index) {
      <div class="flex flex-row items-start p-6 gap-6" [ngClass]="{ 'border-top-1': !$first }">
        <p-avatar
          [label]="item.name.slice(0, 1).toUpperCase()"
          class="mr-1"
          size="xlarge"
        ></p-avatar>
        <div class="flex justify-between items-center flex-1 gap-6">
          <div class="flex flex-col items-start gap-2">
            <div class="text-2xl font-bold text-surface-900 dark:text-surface-0">
              {{ item.name }}
            </div>
            <div class="flex items-center gap-4">
              <span class="flex items-center gap-2">
                <i class="pi pi-user-edit"></i>
                <span class="font-semibold">{{ item.creator }}</span>
              </span>
              <p-tag
                [value]="getSeverityKey(item) | transloco"
                [severity]="getSeverity(item)"
                [style]="getStatusTagStyle(item)"
              ></p-tag>
            </div>
          </div>
          <div class="flex items-center justify-center gap-1">
            <a
              [routerLink]="['/confluence/workspace', item.id]"
              rel="noopener noreferrer"
              class="p-button p-button-rounded p-button-icon-only p-ripple p-button-outlined"
            >
              <i class="pi pi-file-edit"></i>
            </a>
            <p-button
              icon="pi pi-trash"
              [outlined]="true"
              [rounded]="true"
              (click)="removeConfluence(item.id)"
            ></p-button>
          </div>
        </div>
      </div>
    }
  </ng-template>
</p-dataView>
