<section class="landing-hero py-20 px-20 lg:px-20">
  <div class="flex flex-col items-center">
    <h1 class="text-5xl font-bold text-center xl:text-left leading-tight">
      {{ "landing.hero.titlePrefix" | transloco }}
      <span class="font-bold text-primary">{{ "landing.hero.titleAccent" | transloco }}</span>
      {{ "landing.hero.titleSuffix" | transloco }}
    </h1>
    <p
      class="text-center mt-0 mb-20 text-surface-500 dark:text-surface-400 font-medium text-xl leading-relaxed lg:px-56"
    >
      {{ "landing.hero.description" | transloco }}
    </p>
    <div class="flex items-center gap-6">
      <a routerLink="/apps" class="linkbox linkbox-primary">
        <span>{{ "landing.hero.primaryAction" | transloco }}</span>
        <i class="pi pi-arrow-right ms-4"></i>
      </a>
      <a
        href="https://github.com/ethaxon/outposts"
        target="_blank"
        rel="noopener noreferrer"
        class="linkbox"
      >
        <span>{{ "landing.hero.secondaryAction" | transloco }}</span>
        <i class="pi pi-star-fill ms-4 text-yellow-500"></i>
      </a>
    </div>
  </div>
</section>
