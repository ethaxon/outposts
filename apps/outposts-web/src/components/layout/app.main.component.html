<div class="layout-wrapper" [ngClass]="containerClass()">
  <app-news />
  <app-topbar />
  <div
    class="layout-mask"
    [ngClass]="{ 'layout-mask-active': isMenuActive() }"
    (click)="hideMenu()"
    tabindex="0"
    (keyup)="hideMenu()"
  ></div>
  <div class="layout-content">
    <app-menu />
    <div class="layout-content-slot">
      <p-toast [baseZIndex]="9999" />
      <router-outlet></router-outlet>
    </div>
  </div>
  <app-footer />
</div>
<app-spinner />
